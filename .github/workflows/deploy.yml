name: FTP Deploy

# main dalına her push yapıldığında çalışır
on:
  push:
    branches:
      - main
  # Actions sekmesinden elle de tetikleyebilmek için
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu çek
        uses: actions/checkout@v4

      - name: FTP ile sunucuya yükle
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Dosyaların yükleneceği sunucu klasörü.
          # FTP hesabı doğrudan public_html'e açılıyorsa: ./
          # Ana hesapla bağlanıyorsan genelde: ./public_html/ veya ./domains/ALANADIN/public_html/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Siteye ait olmayan dosyaları yüklemiyoruz
          exclude:
            - "**/.git*"
            - "**/.git*/**"
            - ".github/**"
            - ".claude/**"
            - "README.md"
            - "**/.DS_Store"
